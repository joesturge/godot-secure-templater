name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-assets:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    - name: Build binary
      run: |
        mkdir -p dist
        GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/gst-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/gst

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: gst-${{ matrix.goos }}-${{ matrix.goarch }}
        path: dist/gst-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [build-assets]

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        pattern: gst-*
        merge-multiple: true

    - name: Upload binaries to release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        generate_release_notes: true
        files: dist/gst-*
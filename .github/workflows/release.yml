name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-windows-exe:
    name: Publish Windows executable
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    - name: Build Windows executable
      run: |
        mkdir -p dist
        GOOS=windows GOARCH=amd64 go build -o dist/gst-windows-amd64.exe ./cmd/gst

    - name: Upload executable to release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        generate_release_notes: true
        files: dist/gst-windows-amd64.exe